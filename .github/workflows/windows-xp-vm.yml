name: Windows XP VM - Quick Access (Cloudflare)

on:
  workflow_dispatch:
    inputs:
      vm_runtime:
        description: 'VM Runtime (in hours, max 6)'
        required: true
        default: '2'
        type: string

jobs:
  run-windows-xp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📋 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment
        run: |
          echo "🔧 Setting up KVM..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-kvm libvirt-daemon-system cpu-checker jq bc curl wget
          sudo chmod 666 /dev/kvm
          sudo kvm-ok || true
          echo "✅ Environment ready"

      - name: 🪟 Start Windows XP
        run: |
          echo "🚀 Launching Windows XP container..."
          docker run -d \
            --name windows-xp \
            --device=/dev/kvm \
            --device=/dev/net/tun \
            --cap-add NET_ADMIN \
            -e VERSION="xp" \
            -e RAM_SIZE="2G" \
            -e CPU_CORES="2" \
            -e DISK_SIZE="20G" \
            -e USERNAME="Administrator" \
            -e PASSWORD="password123" \
            -p 8006:8006 \
            -p 3389:3389 \
            -v /tmp/storage:/storage \
            dockurr/windows:latest

          echo "✅ Container started!"
          docker ps -f name=windows-xp

      - name: 🌐 Setup Cloudflare Tunnel (No Token)
        run: |
          echo "📥 Installing cloudflared..."

          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared

          if [ ! -f cloudflared ]; then
            echo "❌ Download failed!"
            exit 1
          fi

          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

          echo "🔗 Starting Cloudflare Quick Tunnel..."
          nohup cloudflared tunnel --url http://localhost:8006 > cf.log 2>&1 &

          echo "⏳ Waiting for tunnel URL..."
          for i in {1..20}; do
            URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' cf.log | head -1)
            if [ ! -z "$URL" ]; then
              echo "✅ Tunnel URL acquired!"
              echo "$URL" > /tmp/web_url.txt
              break
            fi
            sleep 2
          done

          echo "🌐 Access URL:"
          cat /tmp/web_url.txt || (echo "❌ Failed to get URL" && cat cf.log)

      - name: ⏳ Wait for Windows to Boot
        run: |
          echo "⏳ Waiting for Windows XP to boot..."

          for i in {1..40}; do
            if docker logs windows-xp 2>&1 | grep -q "Windows started successfully"; then
              echo "✅ Windows XP is running!"
              break
            fi

            if [ $((i % 4)) -eq 0 ]; then
              echo "[$i/40] Still booting ($(($i * 5)) sec)..."
              docker logs --tail 2 windows-xp 2>&1 | sed 's/^/  > /'
            fi

            sleep 5
          done

      - name: 🎉 DISPLAY ACCESS URL
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║                                                ║"
          echo "║      🖥️  WINDOWS XP ACCESS (BROWSER) 🖥️       ║"
          echo "║                                                ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""

          WEB_URL=$(cat /tmp/web_url.txt 2>/dev/null)

          echo "🌐 OPEN THIS LINK:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "    $WEB_URL"
          echo ""
          echo "    👆 Click to access Windows XP in browser"
          echo ""

          echo "💾 Container Status:"
          docker ps -f name=windows-xp --format "Status: {{.Status}} | Uptime: {{.RunningFor}}"
          echo ""

          echo "╔════════════════════════════════════════════════╗"
          echo '║  VM will remain active for ${{ github.event.inputs.vm_runtime }} hours          ║'
          echo "╚════════════════════════════════════════════════╝"
          echo ""

      - name: 🔍 Keep Alive & Monitor
        run: |
          echo "🔄 Monitoring VM..."

          RUNTIME_SECONDS=$(($(echo "${{ github.event.inputs.vm_runtime }}" | bc | cut -d. -f1) * 3600))
          END_TIME=$(($(date +%s) + RUNTIME_SECONDS))

          while [ $(date +%s) -lt $END_TIME ]; do
            echo "⏱️ Time: $(date '+%H:%M:%S')"

            if docker ps -f name=windows-xp --format '{{.Status}}' | grep -q 'Up'; then
              echo "✅ VM running"
            else
              echo "❌ VM stopped"
            fi

            echo "🌐 URL: $(cat /tmp/web_url.txt 2>/dev/null)"
            echo "----------------------------------------"
            sleep 60
          done

          echo "⏰ Time completed!"

      - name: 🛑 Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          docker stop windows-xp 2>/dev/null || true
          docker rm windows-xp 2>/dev/null || true
          pkill cloudflared || true
          echo "✅ Done"
